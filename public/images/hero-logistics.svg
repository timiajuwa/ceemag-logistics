<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="55%" stop-color="#0f2235"/>
      <stop offset="100%" stop-color="#05080c"/>
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0c1f2e"/>
      <stop offset="100%" stop-color="#081018"/>
    </linearGradient>
    <linearGradient id="container" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#7b241c"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect y="620" width="1920" height="460" fill="url(#water)"/>
  <path d="M0 620 Q480 580 960 620 T1920 620 L1920 1080 L0 1080 Z" fill="#0a1520" opacity="0.9"/>
  <!-- Crane -->
  <g opacity="0.35" fill="#9ae66e">
    <rect x="200" y="180" width="12" height="440"/>
    <rect x="140" y="520" width="180" height="14"/>
    <path d="M212 180 L420 320 L212 340 Z"/>
  </g>
  <!-- Containers row -->
  <g opacity="0.85">
    <rect x="120" y="480" width="140" height="90" rx="4" fill="url(#container)"/>
    <rect x="270" y="460" width="140" height="110" rx="4" fill="#1a5276"/>
    <rect x="420" y="490" width="140" height="80" rx="4" fill="#9ae66e" opacity="0.7"/>
    <rect x="570" y="450" width="140" height="120" rx="4" fill="url(#container)"/>
    <rect x="720" y="470" width="140" height="100" rx="4" fill="#1a5276"/>
    <rect x="870" y="485" width="140" height="85" rx="4" fill="#2c3e50"/>
  </g>
  <!-- Ship silhouette -->
  <g opacity="0.5" fill="#1c2833">
    <path d="M1100 560 L1750 560 L1680 640 L1150 640 Z"/>
    <rect x="1280" y="500" width="80" height="60" fill="#2c3e50"/>
    <rect x="1380" y="480" width="60" height="80" fill="#2c3e50"/>
  </g>
  <!-- Grid subtle -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="200" x2="1920" y2="200"/>
    <line x1="0" y1="400" x2="1920" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="1080"/>
    <line x1="640" y1="0" x2="640" y2="1080"/>
    <line x1="960" y1="0" x2="960" y2="1080"/>
    <line x1="1280" y1="0" x2="1280" y2="1080"/>
    <line x1="1600" y1="0" x2="1600" y2="1080"/>
  </g>
</svg>
